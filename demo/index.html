<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modalete — Demo</title>
    <style>
        /* Tema por defecto — el modal usa sus propios defaults */
        modalete-dialog {
            --modalete-bg: #ffffff;
            --modalete-border: #e0e0e0;
            --modalete-title-color: #111111;
            --modalete-message-color: #444444;
            --modalete-backdrop-bg: rgba(0, 0, 0, 0.4);
            --modalete-btn-confirm-bg: #25eb53;
            --modalete-btn-confirm-color: #ffffff;
            --modalete-btn-cancel-bg: #e5e7eb;
            --modalete-btn-cancel-color: #111111;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #111315;
            font-family: "Segoe UI", sans-serif;
            color: #f0f0ea;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #3eb4ff;
        }

        p {
            margin: 0;
            color: #8a8a8a;
            font-size: 0.9rem;
        }

        .demo-btn {
            padding: 12px 28px;
            background: #3eb4ff;
            color: #111315;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .demo-btn:hover {
            opacity: 0.85;
        }

        .resultado {
            font-size: 0.9rem;
            color: #8a8a8a;
            min-height: 24px;
        }
    </style>
</head>

<body>
    <h1>modalete</h1>
    <p>Web Component modal dialog — Promise-based API</p>

    <modalete-dialog data-modalete></modalete-dialog>

    <button class="demo-btn" data-btn-demo>Abrir modal</button>
    <p class="resultado" data-resultado>Esperando decisión...</p>

    <script type="module">
        import '../src/modalete.ts';

        const modal = document.querySelector('[data-modalete]');
        const btnDemo = document.querySelector('[data-btn-demo]');
        const resultado = document.querySelector('[data-resultado]');

        // ─── API principal — await ───────────────────────────────
        btnDemo.addEventListener('click', async () => {
            const ok = await modal.dialog({
                title: '¿Eliminar registro?',
                message: 'Esta acción no se puede deshacer.',
                confirmText: 'Sí, eliminar',
                cancelText: 'Cancelar'
            });

            resultado.textContent = ok
                ? '✅ El usuario confirmó'
                : '❌ El usuario canceló';
        });

        // ─── CustomEvent — escucha global ────────────────────────
        document.addEventListener('modalete:confirm', (e) => {
            console.log('📢 modalete:confirm disparado', e.detail);
        });

        document.addEventListener('modalete:cancel', (e) => {
            console.log('📢 modalete:cancel disparado', e.detail);
        });
    </script>
</body>

</html>
